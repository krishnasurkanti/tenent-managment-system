name: Keep Render Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "${{ secrets.BACKEND_URL }}/api/health")
          echo "Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Server awake."
          else
            echo "Server sleeping or slow — ping sent, it will wake."
          fi
