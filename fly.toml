app = "hostel-backend"
primary_region = "sin"

[build]
  [build.args]
    NODE_ENV = "production"

[env]
  PORT = "4000"
  NODE_ENV = "production"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[processes]
  app = "npm run start:api"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
